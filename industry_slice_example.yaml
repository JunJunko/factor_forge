version: 1

experiment:
  id: exp_factor_in_sw_l1_rotation
  level: L1

evaluation:
  horizons: [1, 3, 5, 10]
  targets:
    - stock_return
    - stock_minus_sw_l1_return

industry_slice:
  enabled: true
  industry_standard: sw
  industry_level: l1
  membership_mode: point_in_time
  selector:
    preset: sw_l1_neutralized_rotation_v1
    overrides:
      short_ema: 3
      long_ema: 10
      breadth_change_window: 5
      ridge_alpha: 1.0
      minimum_industry_members: 8
  scopes:
    - all
    - top2
    - top5
    - top10
    - bottom5
  diagnostics:
    evaluate_industry_selector: true
    save_industry_intermediate: true
