version: 1
kind: factor
factor:
  name: turnover_abs_return_continuation_v2
  label: 换手价格位移脱钩延续V2
  description: >
    在全体因子合格股票截面计算个股相对申万一级行业的单日收益、换手率标准分
    与行业相对绝对收益标准分。两者之差表示换手活跃程度超过价格位移的连续
    差值，再按行业相对收益符号赋予方向。因子评价与回测另行限定 liquid 股票池。
  hypothesis: >
    若高换手低位移反映暂时被吸收的信息流，则吸收差应在未来五个交易日沿
    当日行业相对收益方向继续释放。若 discovery 主指标为负，必须停止并修订
    为流动性反转假设，不能在 validation 内改变方向。
  direction: positive
  expected_shape: monotonic
data:
  frequency: daily
  required_fields: [close, turnover_rate, industry_l1_code]
  lookback_days: 1
scope:
  universe: default
  cross_section: market
  group_field: industry_l1_code
  industry_standard: SW2021
  industry_level: L1
  point_in_time_required: true
  min_group_size: 10
calculation:
  parameters: {}
  features:
    ret_1d: ret(close, 1)
    industry_ret_1d: group_mean(ret_1d, by=industry_l1_code)
    relative_ret_1d: ret_1d - industry_ret_1d
    turnover_score: cs_zscore(turnover_rate)
    displacement_score: cs_zscore(abs(relative_ret_1d))
    absorption_gap: turnover_score - displacement_score
  formula: where(relative_ret_1d >= 0, absorption_gap, -absorption_gap)
  missing_policy: skip
  winsorize: mad
  mad_scale: 5.0
  standardize: zscore
output:
  value_field: factor_value

