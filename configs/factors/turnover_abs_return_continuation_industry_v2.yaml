version: 1
kind: factor
factor:
  name: turnover_abs_return_continuation_industry_v2
  label: 行业内换手价格位移脱钩延续V2
  description: >
    在全体因子合格股票中按申万一级行业分别标准化换手率和行业相对绝对收益，
    构造换手活跃程度超过价格位移的连续差值，并按行业相对收益符号赋予方向。
    因子评价与回测另行限定 liquid 股票池，用于检验市场级关系是否来自截面构成。
  hypothesis: >
    若延迟价格发现是个股层面的增量关系，则行业内标准化后仍应对未来五日
    行业相对收益保持同方向 Rank IC；显著衰减则支持截面构成解释。
  direction: positive
  expected_shape: monotonic
data:
  frequency: daily
  required_fields: [close, turnover_rate, industry_l1_code]
  lookback_days: 1
scope:
  universe: default
  cross_section: industry
  group_field: industry_l1_code
  industry_standard: SW2021
  industry_level: L1
  point_in_time_required: true
  min_group_size: 10
calculation:
  parameters: {}
  features:
    ret_1d: ret(close, 1)
    industry_ret_1d: group_mean(ret_1d, by=industry_l1_code)
    relative_ret_1d: ret_1d - industry_ret_1d
    turnover_score: cs_zscore(turnover_rate, by=industry_l1_code)
    displacement_score: cs_zscore(abs(relative_ret_1d), by=industry_l1_code)
    absorption_gap: turnover_score - displacement_score
  formula: where(relative_ret_1d >= 0, absorption_gap, -absorption_gap)
  missing_policy: skip
  winsorize: mad
  mad_scale: 5.0
  standardize: zscore
output:
  value_field: factor_value

