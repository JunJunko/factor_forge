version: 1
kind: factor
factor:
  name: capital_improvement_v1
  label: Capital improvement
  description: Five-day turnover-rate change.
  hypothesis: Improving capital participation can precede price discovery.
  direction: positive
  expected_shape: monotonic
data:
  frequency: daily
  required_fields: [turnover_rate]
  lookback_days: 5
scope: {universe: default, cross_section: market, min_group_size: 10}
calculation:
  parameters: {window: {value: 5, robustness_neighbors: [3, 5, 10]}}
  formula: delta(turnover_rate, window)
  winsorize: none
  standardize: none
output: {value_field: factor_value}
