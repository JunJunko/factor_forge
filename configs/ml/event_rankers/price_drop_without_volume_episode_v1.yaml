version: 1
name: price_drop_without_volume_episode_v1
project_config: configs/project.yaml
data_version: latest
template: configs/radar/price_drop_without_volume_confirmation_v1.yaml
source_observation_dir: artifacts/radar_observations/obs_price_drop_without_volume_confirmation_v1_75ef3966668601a7
as_of_date: "2026-07-10"
horizons: [1, 3, 5, 10]
primary_horizon: 5
episode:
  history_trading_days: 504
  sequence_length: 60
  min_valid_days: 40
  dedup_trading_days: 5
  decay_half_life_days: 126
split:
  train_fraction: 0.60
  valid_fraction: 0.20
  test_fraction: 0.20
matching:
  exact: [trade_date, industry_l1_code]
  neighbors: 3
  caliper: 3.0
  allow_control_reuse: true
  min_match_rate: 0.60
  stages:
    - id: same_date_industry
      controls: []
    - id: prior_return_control
      controls: [prior_return_5d]
    - id: return_volatility_controls
      controls: [prior_return_5d, volatility_20d]
    - id: full_controls
      controls: [prior_return_5d, volatility_20d, log_avg_amount_20d, log_total_mv]
features:
  windows: [5, 10, 20, 60]
  winsor_quantile: 0.01
  cross_sectional_zscore: true
encoder:
  backend: torch_reference
  d_model: 16
  d_state: 8
  layers: 1
  embedding_dim: 8
  dropout: 0.10
  mask_probability: 0.20
training:
  epochs: 10
  batch_size: 256
  learning_rate: 0.002
  weight_decay: 0.0001
  patience: 3
  validation_fraction: 0.15
  max_train_samples: 50000
  max_valid_samples: 20000
  random_seeds: [17, 29, 43]
  device: cpu
  num_workers: 0
lightgbm:
  objective: regression
  learning_rate: 0.03
  num_leaves: 31
  max_depth: -1
  n_estimators: 300
  subsample: 0.8
  colsample_bytree: 0.8
  reg_alpha: 0.1
  reg_lambda: 0.1
  random_state: 42
  n_jobs: -1
minimum_matched_episodes: 300
output_root: artifacts/event_episode_runs
