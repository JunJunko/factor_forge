version: 1
name: post_impulse_path_ml_v1
project_config: configs/project.yaml
data_version: data_v1_20260710T115133Z_208e9fc8
history_start_date: "2019-01-01"
segments:
  train: {start: "2021-01-01", end: "2023-12-31"}
  valid: {start: "2024-01-01", end: "2024-12-31"}
  # This interval has already been inspected by the earlier composition run.
  test: {start: "2025-01-01", end: "2026-06-30"}
features:
  history_window: 252
  min_history: 120
  atr_window: 20
  beta_window: 60
  impulse_return_window: 3
  impulse_percentile: 0.90
  industry_percentile: 0.80
  observation_days: 3
  event_cooldown_days: 5
  pressure_threshold: 0.60
  pressure_min_components: 2
  min_listing_days: 60
  market_window: 20
  industry_breadth_window: 5
labels:
  horizon: 10
  mfe_atr_threshold: 1.5
  mae_atr_limit: 1.0
  quality_mae_penalty: 0.5
  breakout_buffer_atr: 0.0
training:
  sample_scope: pressure_events
  # Add lightgbm only after the fixed Ridge/Logit feature-block audit is accepted.
  regression_models: [ridge]
  run_success_classifier: true
  ridge_alpha: 1000.0
  logistic_c: 1.0
  minimum_train_events: 300
  minimum_daily_events: 5
  arms: [m0, m1, m2, m3, m4, m5]
  lightgbm:
    objective: regression
    learning_rate: 0.03
    num_leaves: 15
    max_depth: 4
    n_estimators: 300
    subsample: 0.8
    colsample_bytree: 0.8
    reg_alpha: 0.1
    reg_lambda: 1.0
    random_state: 42
    n_jobs: -1
output_root: artifacts/post_impulse_ml_runs
