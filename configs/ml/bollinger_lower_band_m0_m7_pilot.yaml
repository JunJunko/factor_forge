version: 1
name: bollinger_lower_band_m0_m7_pilot
project_config: configs/project.yaml
data_version: latest
require_full_segment_coverage: true
universe_top_n: 300
cache_dataset: true
segments:
  train: {start: "2017-01-01", end: "2022-12-31"}
  valid: {start: "2023-01-01", end: "2023-12-31"}
  test: {start: "2024-01-01", end: "2026-06-30"}
features:
  atr_window: 20
  ma_window: 20
  bollinger_std: 2.0
  percentile_window: 120
  amount_window: 20
  event_pool_threshold: -0.5
  shape_clip: 3.0
  velocity_window: 5
  acceleration_window: 5
  natr_ema_span: 3
  min_listing_days: 60
  winsor_quantile: 0.01
  cross_sectional_zscore: false
  use_sample_weight: false
label:
  horizons: [3, 5, 10]
  primary_horizon: 5
  label_method: open_to_open
  industry_neutralize: true
  cross_sectional_rank_label: false
model:
  objective: regression
  learning_rate: 0.03
  num_leaves: 15
  max_depth: 4
  n_estimators: 500
  subsample: 0.8
  colsample_bytree: 0.8
  reg_alpha: 0.1
  reg_lambda: 1.0
  random_state: 42
  n_jobs: -1
random_seeds: [42, 2026, 3407, 8888, 10086]
output_root: artifacts/atr_reversion_runs
