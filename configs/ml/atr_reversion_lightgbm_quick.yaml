version: 1
name: atr_lower_shadow_reversion_quick
project_config: configs/project.yaml
data_version: latest
require_full_segment_coverage: true
universe_top_n: 300
cache_dataset: true
segments:
  train: {start: "2019-01-01", end: "2022-12-31"}
  valid: {start: "2023-01-01", end: "2023-12-31"}
  test: {start: "2024-01-01", end: "2026-06-30"}
features:
  atr_window: 20
  ma_window: 20
  long_ma_window: 60
  percentile_window: 120
  amount_window: 20
  amount_shock_window: 20
  market_window: 5
  min_listing_days: 60
  winsor_quantile: 0.01
  cross_sectional_zscore: true
  use_sample_weight: true
  extreme_vol_quantile: 0.95
label:
  horizons: [3, 5, 10]
  primary_horizon: 5
  label_method: open_to_open
  industry_neutralize: true
  cross_sectional_rank_label: true
model:
  objective: regression
  learning_rate: 0.03
  num_leaves: 15
  max_depth: 4
  n_estimators: 300
  subsample: 0.8
  colsample_bytree: 0.8
  reg_alpha: 0.1
  reg_lambda: 1.0
  random_state: 42
  n_jobs: -1
output_root: artifacts/atr_reversion_runs

