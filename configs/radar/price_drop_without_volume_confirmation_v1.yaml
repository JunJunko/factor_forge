version: 1
id: price_drop_without_volume_confirmation_v1
kind: price_drop_without_volume_confirmation
description: 3日收益处于自身历史低分位，但当日成交量未提供同步放量确认
observation_type: relation_anomaly
data:
  required_fields: [adj_close, volume_shares]
  universe_field: is_liquid
  entity_field: ts_code
  date_field: trade_date
  industry_field: industry_l1_code
scan:
  discovery_window_days: 252
  recent_window_days: 20
filters: &standard_filters
  min_listing_days: 250
  exclude_st: true
  exclude_suspended: true
  exclude_limit_locked: true
quality_gate: &standard_quality
  min_events: 300
  min_unique_stocks: 100
  min_unique_industries: 15
  max_industry_share: 0.30
  max_single_stock_share: 0.03
parameters:
  return_horizon: 3
  return_history:
    window: 252
    min_periods: 60
  volume_history:
    window: 60
    min_periods: 20
  return_percentile_lte: 0.05
  volume_percentile_lte: 0.50
