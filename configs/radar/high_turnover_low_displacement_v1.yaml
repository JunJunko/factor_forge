version: 1
id: high_turnover_low_displacement_v1
kind: high_turnover_low_displacement
description: 高换手但绝对收益低于同日换手水平所预期的价格位移
observation_type: relation_anomaly
data:
  required_fields: [adj_close, turnover_rate]
  universe_field: is_liquid
  entity_field: ts_code
  date_field: trade_date
  industry_field: industry_l1_code
scan: {discovery_window_days: 252, recent_window_days: 20}
filters: {min_listing_days: 250, exclude_st: true, exclude_suspended: true, exclude_limit_locked: true}
quality_gate: {min_events: 300, min_unique_stocks: 100, min_unique_industries: 15, max_industry_share: 0.30, max_single_stock_share: 0.03}
parameters:
  turnover_history: {window: 60, min_periods: 40}
  residual_history: {window: 252, min_periods: 120}
  turnover_percentile_gte: 0.90
  residual_percentile_lte: 0.10
  min_cross_section: 100
