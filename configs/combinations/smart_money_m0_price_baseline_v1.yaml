version: 1
kind: factor_combination
factor_combination:
  id: smart_money_m0_price_baseline_v1
  name: 主板聪明钱M0价格与状态基线
  description: 固定方向的价格趋势、收盘位置、拥挤与波动基线。
  components:
    - {id: trend, source: {type: yaml, path: ../factors/prior_industry_relative_return_20d_v1.yaml}, direction: positive, weight: 0.35}
    - {id: close_location, source: {type: yaml, path: ../factors/close_location_1d_v1.yaml}, direction: positive, weight: 0.25}
    - {id: turnover_risk, source: {type: yaml, path: ../factors/turnover_abnormal_120d_v1.yaml}, direction: negative, weight: 0.20}
    - {id: volatility_risk, source: {type: yaml, path: ../factors/volatility_20d_v1.yaml}, direction: negative, weight: 0.20}
  preprocessing:
    winsorize: {enabled: true, method: percentile, lower: 0.01, upper: 0.99}
    normalization: {method: cs_zscore, scope: trade_date, min_samples: 100}
    missing_value: {method: intersection, minimum_valid_components: 4}
  combination: {method: weighted_sum, normalize_weights: true}
  output: {direction: positive, column: factor_value}
