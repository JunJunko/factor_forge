version: 1
kind: factor_combination

factor_combination:
  id: momentum_sw_l2_acceleration_v1
  name: 20日动量与申万二级行业排名加速度组合V1
  description: 等权组合全市场20日动量与申万二级行业内相对强弱排名加速度。

  components:
    - id: momentum_20d
      source:
        type: yaml
        path: ../factors/momentum_20d.yaml
      direction: positive
      weight: 0.50

    - id: sw_l2_rank_acceleration
      source:
        type: yaml
        path: ../factors/sw_l2_industry_rank_acceleration.yaml
      direction: positive
      weight: 0.50

  preprocessing:
    winsorize:
      enabled: true
      method: percentile
      lower: 0.01
      upper: 0.99

    normalization:
      method: cs_zscore
      scope: trade_date
      min_samples: 2

    missing_value:
      method: intersection

  combination:
    method: equal_weight

  variants:
    - id: momentum_only
      components:
        - momentum_20d

    - id: sw_l2_acceleration_only
      components:
        - sw_l2_rank_acceleration

    - id: full_combo
      components:
        - momentum_20d
        - sw_l2_rank_acceleration

  output:
    direction: positive
    column: factor_value
